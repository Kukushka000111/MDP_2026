services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: cultural_navigator
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d cultural_navigator"]
      interval: 3s
      timeout: 5s
      retries: 10
      start_period: 5s

  api:
    build:
      context: .
      dockerfile: server/Dockerfile
    restart: unless-stopped
    environment:
      PORT: 4000
      NODE_ENV: production
      DATABASE_URL: postgresql://postgres:postgres@db:5432/cultural_navigator
      JWT_SECRET: ${JWT_SECRET:-change-me-for-docker}
      ADMIN_EMAILS: ${ADMIN_EMAILS:-admin@example.com}
    depends_on:
      db:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: client/Dockerfile
      args:
        VITE_API_URL: /api
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-8080}:80"
    depends_on:
      - api

volumes:
  pgdata:
